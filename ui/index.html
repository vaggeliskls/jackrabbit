<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runner Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0f1117;
  color: #e2e8f0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────── */
header {
  background: #1a1d27;
  border-bottom: 1px solid #2d3748;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
header h1 { font-size: 16px; font-weight: 700; color: #90cdf4; letter-spacing: 0.02em; }
.token-row { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.token-row label { font-size: 11px; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; }

/* ── Inputs / Buttons ───────────────────────────────────── */
input[type=text], input[type=number], textarea, select {
  background: #2d3748;
  border: 1px solid #4a5568;
  border-radius: 4px;
  color: #e2e8f0;
  padding: 5px 10px;
  font-size: 13px;
  font-family: inherit;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: #63b3ed; }
button {
  background: #3182ce;
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 5px 14px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
button:hover { background: #2b6cb0; }
button:disabled { background: #4a5568; cursor: default; color: #718096; }
button.secondary { background: #2d3748; color: #a0aec0; }
button.secondary:hover { background: #4a5568; }
button.danger { background: #c53030; }
button.danger:hover { background: #9b2c2c; }

/* ── Main layout ────────────────────────────────────────── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Left panel: runner list ────────────────────────────── */
.panel-left {
  width: 250px;
  flex-shrink: 0;
  background: #13161f;
  border-right: 1px solid #2d3748;
  display: flex;
  flex-direction: column;
}
.panel-title {
  padding: 10px 14px;
  border-bottom: 1px solid #2d3748;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.panel-title h2 {
  font-size: 10px;
  font-weight: 700;
  color: #718096;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.runner-list { flex: 1; overflow-y: auto; }

.runner-item {
  padding: 9px 14px;
  cursor: pointer;
  border-bottom: 1px solid #1a1d27;
  display: flex;
  align-items: center;
  gap: 9px;
  border-left: 3px solid transparent;
  transition: background 0.1s;
}
.runner-item:hover { background: #1e2232; }
.runner-item.selected { background: #1e2d45; border-left-color: #63b3ed; }

.status-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.status-dot.online  { background: #48bb78; box-shadow: 0 0 5px #48bb7888; }
.status-dot.offline { background: #4a5568; }
.status-dot.orphaned { background: #ed8936; box-shadow: 0 0 5px #ed893688; }

.runner-info { flex: 1; min-width: 0; }
.runner-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.runner-slug { font-size: 11px; color: #4a5568; font-family: monospace; }
.runner-count { font-size: 11px; color: #718096; flex-shrink: 0; }

/* ── Right panel ────────────────────────────────────────── */
.panel-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* Runner details */
.details-area {
  padding: 14px 18px;
  border-bottom: 1px solid #2d3748;
  background: #13161f;
  flex-shrink: 0;
}
.section-title {
  font-size: 10px;
  font-weight: 700;
  color: #718096;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
.detail-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px 12px;
  margin-bottom: 8px;
}
.detail-item { }
.detail-label { font-size: 10px; color: #4a5568; text-transform: uppercase; letter-spacing: 0.05em; }
.detail-value { font-size: 13px; font-weight: 500; margin-top: 1px; }

.badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.badge.online  { background: #1c4532; color: #9ae6b4; }
.badge.offline { background: #2d3748; color: #718096; }
.badge.orphaned { background: #7b341e; color: #fbd38d; }

.tags-list { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
.tag { background: #1a2744; color: #90cdf4; padding: 2px 7px; border-radius: 4px; font-size: 11px; }

.empty-msg { color: #4a5568; font-size: 13px; }

/* Command form */
.command-area {
  padding: 12px 18px;
  border-bottom: 1px solid #2d3748;
  background: #0f1117;
  flex-shrink: 0;
}
.command-form { display: flex; flex-direction: column; gap: 8px; }
.form-row { display: flex; align-items: center; gap: 10px; }
.form-row label { font-size: 11px; color: #718096; width: 72px; flex-shrink: 0; }
textarea.payload {
  width: 100%;
  height: 68px;
  resize: vertical;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.5;
}
.inline-status { font-size: 12px; color: #718096; }
.inline-status.error { color: #fc8181; }

/* ── Results panel ──────────────────────────────────────── */
.panel-bottom {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #0a0c12;
}
.results-header {
  padding: 6px 14px;
  border-bottom: 1px solid #2d3748;
  display: flex;
  align-items: center;
  gap: 4px;
  background: #13161f;
  flex-shrink: 0;
}
.results-header h2 { font-size: 10px; font-weight: 700; color: #718096; text-transform: uppercase; letter-spacing: 0.08em; margin-right: 6px; }

.tab-btn {
  background: transparent;
  color: #718096;
  border: none;
  border-bottom: 2px solid transparent;
  border-radius: 0;
  padding: 3px 10px;
  font-size: 12px;
  cursor: pointer;
  transition: color 0.15s;
}
.tab-btn:hover { background: transparent; color: #e2e8f0; }
.tab-btn.active { color: #63b3ed; border-bottom-color: #63b3ed; }

.cmd-meta { margin-left: auto; display: flex; align-items: center; gap: 12px; font-size: 11px; color: #718096; }
.cmd-meta code { font-size: 10px; color: #a0aec0; }
.status-chip {
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.status-chip.queued   { background: #2d3748; color: #a0aec0; }
.status-chip.claimed  { background: #1a365d; color: #63b3ed; }
.status-chip.running  { background: #1a365d; color: #63b3ed; }
.status-chip.success  { background: #1c4532; color: #9ae6b4; }
.status-chip.failed   { background: #742a2a; color: #fc8181; }
.status-chip.cancelled { background: #4a5568; color: #e2e8f0; }
.status-chip.expired  { background: #7b341e; color: #fbd38d; }

/* Tab panes */
.tab-pane { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.tab-pane.active { display: flex; }

/* Log output */
.log-output {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.6;
}
.log-line { display: flex; gap: 10px; padding: 0 14px; }
.log-line:hover { background: #13161f; }
.log-ts  { color: #2d3748; flex-shrink: 0; font-size: 11px; padding-top: 1px; }
.log-src { flex-shrink: 0; width: 52px; font-size: 11px; }
.log-src.stdout { color: #48bb78; }
.log-src.stderr { color: #fc8181; }
.log-src.system { color: #63b3ed; }
.log-text { color: #cbd5e0; white-space: pre-wrap; word-break: break-all; }

/* Metrics table */
.metrics-output {
  flex: 1;
  overflow-y: auto;
  padding: 8px 14px;
}
.mtable {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.mtable th {
  text-align: left;
  padding: 5px 8px;
  color: #718096;
  border-bottom: 1px solid #2d3748;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.mtable td { padding: 3px 8px; border-bottom: 1px solid #13161f; color: #a0aec0; }
.mtable tr:hover td { background: #13161f; }
.bar {
  display: inline-block;
  height: 4px;
  background: #3182ce;
  border-radius: 2px;
  vertical-align: middle;
  margin-left: 5px;
  min-width: 2px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Runner Dashboard</h1>
  <div class="token-row">
    <label>API Token</label>
    <input type="text" id="tokenInput" placeholder="your-token-here" style="width:180px;" />
    <button onclick="saveToken()">Save</button>
  </div>
</header>

<div class="main">

  <!-- ── Left: runner list ───────────────────────────── -->
  <div class="panel-left">
    <div class="panel-title">
      <h2>Runners</h2>
      <button class="secondary" onclick="loadRunners()" style="padding:2px 8px;font-size:10px;">Refresh</button>
    </div>
    <div class="runner-list" id="runnerList">
      <div style="padding:16px;color:#4a5568;font-size:13px;">Loading…</div>
    </div>
  </div>

  <!-- ── Right panel ─────────────────────────────────── -->
  <div class="panel-right">

    <!-- Runner details -->
    <div class="details-area">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="section-title" style="margin-bottom:0;">Runner Details</div>
        <button class="danger" id="deleteBtn" onclick="deleteRunner()" disabled style="padding:3px 10px;font-size:11px;">Delete Runner</button>
      </div>
      <div id="runnerDetails">
        <span class="empty-msg">Select a runner from the list</span>
      </div>
    </div>

    <!-- Send command -->
    <div class="command-area">
      <div class="section-title">Send Command</div>
      <div class="command-form">
        <div>
          <div style="font-size:11px;color:#718096;margin-bottom:4px;">Payload (JSON)</div>
          <textarea class="payload" id="payloadInput">{"cmd": "echo hello"}</textarea>
        </div>
        <div class="form-row">
          <label>Timeout (s)</label>
          <input type="number" id="timeoutInput" value="300" min="1" style="width:72px;" />
          <label style="margin-left:8px;">Max retries</label>
          <input type="number" id="retriesInput" value="0" min="0" max="10" style="width:56px;" />
          <button id="sendBtn" onclick="sendCommand()" disabled style="margin-left:auto;">Send Command</button>
          <button class="danger" id="killBtn" onclick="killCommand()" style="display:none;">Kill</button>
          <span class="inline-status" id="inlineStatus"></span>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div class="panel-bottom">
      <div class="results-header">
        <h2>Results</h2>
        <button class="tab-btn active" id="tab-btn-logs"    onclick="switchTab('logs',this)">Logs</button>
        <button class="tab-btn"        id="tab-btn-metrics" onclick="switchTab('metrics',this)">Metrics</button>
        <div class="cmd-meta" id="cmdMeta"></div>
      </div>

      <div class="tab-pane active" id="pane-logs">
        <div class="log-output" id="logOutput">
          <div style="padding:14px;color:#4a5568;font-size:13px;">No command output yet</div>
        </div>
      </div>

      <div class="tab-pane" id="pane-metrics">
        <div class="metrics-output" id="metricsOutput">
          <div style="padding:14px;color:#4a5568;font-size:13px;">No metrics yet</div>
        </div>
      </div>
    </div>

  </div><!-- /panel-right -->
</div><!-- /main -->

<script>
'use strict';

// ── State ───────────────────────────────────────────────────────────────
let token         = localStorage.getItem('runner_token') || '';
let runnersMap    = {};
let selectedSlug  = null;
let activeCmd     = null;   // full command object
let pollTimer     = null;
let refreshTimer  = null;
let logCount      = 0;
let metricCount   = 0;

// ── Boot ────────────────────────────────────────────────────────────────
document.getElementById('tokenInput').value = token;
loadRunners();
refreshTimer = setInterval(loadRunners, 5000);
restoreLastCommand();

async function restoreLastCommand() {
  const id = localStorage.getItem('last_command_id');
  if (!id) return;
  try {
    const [cmd, logs, metrics] = await Promise.all([
      api(`/api/v1/commands/${id}`),
      api(`/api/v1/commands/${id}/logs?page=1&page_size=1000`).catch(() => []),
      api(`/api/v1/commands/${id}/metrics?resolution=raw&page=1&page_size=1000`).catch(() => []),
    ]);
    activeCmd = cmd;
    updateCmdMeta(cmd);
    if (logs && logs.length)    { appendLogs(logs);    logCount    = logs.length; }
    if (metrics && metrics.length) { renderMetrics(metrics); metricCount = metrics.length; }
    const terminal = ['success', 'failed', 'cancelled', 'expired'];
    if (!terminal.includes(cmd.status)) {
      document.getElementById('killBtn').style.display = '';
      startPolling(id);
    }
  } catch (_) { /* command may no longer exist */ }
}

// ── Token ───────────────────────────────────────────────────────────────
function saveToken() {
  token = document.getElementById('tokenInput').value.trim();
  localStorage.setItem('runner_token', token);
  loadRunners();
}

function authHeaders() {
  return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
}

async function api(path, opts = {}) {
  const res = await fetch(path, { ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) } });
  if (res.status === 204) return null;
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    throw new Error(res.status + ': ' + body);
  }
  return res.json();
}

// ── Runners ─────────────────────────────────────────────────────────────
async function loadRunners() {
  try {
    const list = await api('/api/v1/runners');
    runnersMap = {};
    list.forEach(r => runnersMap[r.slug] = r);
    renderRunnerList(list);
    if (selectedSlug && runnersMap[selectedSlug]) {
      renderRunnerDetails(runnersMap[selectedSlug]);
    }
  } catch (e) {
    document.getElementById('runnerList').innerHTML =
      `<div style="padding:12px;color:#fc8181;font-size:12px;">Error: ${esc(e.message)}</div>`;
  }
}

function renderRunnerList(list) {
  const el = document.getElementById('runnerList');
  if (!list || list.length === 0) {
    el.innerHTML = '<div style="padding:16px;color:#4a5568;font-size:13px;">No runners registered</div>';
    return;
  }
  el.innerHTML = list.map(r => `
    <div class="runner-item ${r.slug === selectedSlug ? 'selected' : ''}"
         data-slug="${esc(r.slug)}"
         onclick="selectRunner(this.dataset.slug)">
      <div class="status-dot ${r.status}"></div>
      <div class="runner-info">
        <div class="runner-name">${esc(r.name)}</div>
        <div class="runner-slug">${esc(r.slug)}</div>
      </div>
      <div class="runner-count">${r.active_count}/${r.concurrency_limit}</div>
    </div>
  `).join('');
}

function selectRunner(slug) {
  selectedSlug = slug;
  const r = runnersMap[slug];
  renderRunnerList(Object.values(runnersMap));
  renderRunnerDetails(r);
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('deleteBtn').disabled = false;
}

async function deleteRunner() {
  if (!selectedSlug) return;
  if (!confirm(`Delete runner "${selectedSlug}"?`)) return;

  try {
    await api(`/api/v1/runners/${selectedSlug}`, { method: 'DELETE' });
    selectedSlug = null;
    document.getElementById('runnerDetails').innerHTML = '<span class="empty-msg">Select a runner from the list</span>';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('deleteBtn').disabled = true;
    loadRunners();
  } catch (e) {
    alert('Delete failed: ' + e.message);
  }
}

function renderRunnerDetails(r) {
  const lastSeen = r.last_seen ? new Date(r.last_seen).toLocaleString() : 'Never';
  const tags = r.tags && r.tags.length
    ? r.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')
    : '<span style="color:#4a5568">—</span>';

  document.getElementById('runnerDetails').innerHTML = `
    <div class="detail-grid">
      <div class="detail-item">
        <div class="detail-label">Name</div>
        <div class="detail-value">${esc(r.name)}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Slug</div>
        <div class="detail-value" style="font-family:monospace;font-size:12px">${esc(r.slug)}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Status</div>
        <div class="detail-value"><span class="badge ${r.status}">${r.status}</span></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Active / Limit</div>
        <div class="detail-value">${r.active_count} / ${r.concurrency_limit}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">GPU</div>
        <div class="detail-value">${r.gpu_capable ? 'Yes' : 'No'}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Last Seen</div>
        <div class="detail-value" style="font-size:11px">${lastSeen}</div>
      </div>
      <div class="detail-item" style="grid-column:span 2">
        <div class="detail-label">Tags</div>
        <div class="tags-list" style="margin-top:3px">${tags}</div>
      </div>
    </div>
  `;
}

// ── Send command ─────────────────────────────────────────────────────────
async function sendCommand() {
  if (!selectedSlug) return;

  let payload;
  try {
    payload = JSON.parse(document.getElementById('payloadInput').value);
  } catch (e) {
    setStatus('Invalid JSON: ' + e.message, true);
    return;
  }

  const body = {
    target_type:  'slug',
    target_value: selectedSlug,
    payload,
    timeout_secs: parseInt(document.getElementById('timeoutInput').value)  || 300,
    max_retries:  parseInt(document.getElementById('retriesInput').value)   || 0,
  };

  document.getElementById('sendBtn').disabled = true;
  setStatus('Sending…');
  clearResults();

  try {
    const cmd = await api('/api/v1/commands', { method: 'POST', body: JSON.stringify(body) });
    activeCmd = cmd;
    localStorage.setItem('last_command_id', cmd.id);
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('killBtn').style.display = '';
    setStatus('');
    startPolling(cmd.id);
  } catch (e) {
    document.getElementById('sendBtn').disabled = false;
    setStatus(e.message, true);
  }
}

async function killCommand() {
  if (!activeCmd) return;
  try {
    await api(`/api/v1/commands/${activeCmd.id}/kill`, { method: 'POST' });
    setStatus('Kill signal sent');
  } catch (e) {
    setStatus('Kill failed: ' + e.message, true);
  }
}

// ── Polling ──────────────────────────────────────────────────────────────
function startPolling(cmdId) {
  clearInterval(pollTimer);
  logCount    = 0;
  metricCount = 0;
  let graceTicks = 0; // extra ticks after terminal state for late-arriving logs

  async function tick() {
    try {
      const [cmd, logs, metrics] = await Promise.all([
        api(`/api/v1/commands/${cmdId}`),
        api(`/api/v1/commands/${cmdId}/logs?page=1&page_size=1000`).catch(() => []),
        api(`/api/v1/commands/${cmdId}/metrics?resolution=raw&page=1&page_size=1000`).catch(() => []),
      ]);

      activeCmd = cmd;
      updateCmdMeta(cmd);

      if (logs && logs.length > logCount) {
        appendLogs(logs.slice(logCount));
        logCount = logs.length;
      }
      if (metrics && metrics.length > metricCount) {
        renderMetrics(metrics);
        metricCount = metrics.length;
      }

      if (['success', 'failed', 'cancelled', 'expired'].includes(cmd.status)) {
        document.getElementById('killBtn').style.display = 'none';
        graceTicks++;
        // Poll 3 more times after terminal state to catch late-arriving logs/metrics
        if (graceTicks >= 3) clearInterval(pollTimer);
      }
    } catch (e) {
      setStatus('Poll error: ' + e.message, true);
    }
  }

  tick();
  pollTimer = setInterval(tick, 2000);
}

function updateCmdMeta(cmd) {
  const elapsed = cmd.started_at
    ? cmd.finished_at
      ? ((new Date(cmd.finished_at) - new Date(cmd.started_at)) / 1000).toFixed(1) + 's'
      : 'running…'
    : '';
  const exit = cmd.exit_code != null ? `exit&nbsp;${cmd.exit_code}` : '';

  document.getElementById('cmdMeta').innerHTML = `
    <code>${cmd.id.substring(0,8)}…</code>
    <span class="status-chip ${cmd.status}">${cmd.status}</span>
    ${elapsed ? `<span>${elapsed}</span>` : ''}
    ${exit    ? `<span>${exit}</span>` : ''}
  `;
}

// ── Logs ─────────────────────────────────────────────────────────────────
function clearResults() {
  document.getElementById('logOutput').innerHTML =
    '<div style="padding:14px;color:#4a5568;font-size:13px;">Waiting for output…</div>';
  document.getElementById('metricsOutput').innerHTML =
    '<div style="padding:14px;color:#4a5568;font-size:13px;">Waiting for metrics…</div>';
  document.getElementById('cmdMeta').innerHTML = '';
  logCount    = 0;
  metricCount = 0;
}

function appendLogs(logs) {
  const el = document.getElementById('logOutput');
  const placeholder = el.querySelector('div');
  if (placeholder) placeholder.remove();

  const frag = document.createDocumentFragment();
  for (const log of logs) {
    const row  = document.createElement('div');
    row.className = 'log-line';
    const ts   = new Date(log.ts).toLocaleTimeString('en-GB', { hour12: false });
    const src  = log.source;
    row.innerHTML =
      `<span class="log-ts">${ts}</span>` +
      `<span class="log-src ${src}">[${src}]</span>` +
      `<span class="log-text">${esc(log.line)}</span>`;
    frag.appendChild(row);
  }
  el.appendChild(frag);
  el.scrollTop = el.scrollHeight;
}

// ── Metrics ──────────────────────────────────────────────────────────────
function renderMetrics(metrics) {
  if (!metrics || metrics.length === 0) return;

  const maxCpu = Math.max(...metrics.map(m => m.cpu_percent || 0), 1);

  const rows = metrics.slice().reverse().slice(0, 200).map(m => {
    const cpu    = m.cpu_percent != null ? m.cpu_percent.toFixed(1) : '—';
    const mem    = m.mem_mb      != null ? m.mem_mb.toFixed(0)      : '—';
    const gpu    = m.gpu_percent != null ? m.gpu_percent.toFixed(1) : '—';
    const gpuMem = m.gpu_mem_mb  != null ? m.gpu_mem_mb.toFixed(0)  : '—';
    const barW   = m.cpu_percent != null ? Math.round((m.cpu_percent / maxCpu) * 64) : 0;
    const ts     = new Date(m.sample_ts).toLocaleTimeString('en-GB', { hour12: false });
    return `<tr>
      <td style="color:#4a5568">${ts}</td>
      <td>${cpu}${barW > 0 ? `<span class="bar" style="width:${barW}px"></span>` : ''}</td>
      <td>${mem}</td>
      <td>${gpu}</td>
      <td>${gpuMem}</td>
    </tr>`;
  }).join('');

  document.getElementById('metricsOutput').innerHTML = `
    <table class="mtable">
      <thead>
        <tr>
          <th>Time</th><th>CPU %</th><th>Mem MB</th><th>GPU %</th><th>GPU Mem MB</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-' + name).classList.add('active');
}

// ── Utils ─────────────────────────────────────────────────────────────────
function setStatus(msg, isError = false) {
  const el = document.getElementById('inlineStatus');
  el.textContent = msg;
  el.className   = 'inline-status' + (isError ? ' error' : '');
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
